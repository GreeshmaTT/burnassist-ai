{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="text-end mb-3">
        <button class="btn btn-secondary btn-sm"
                onclick="toggleDarkMode()">🌙 Toggle Dark Mode</button>
    </div>

    <div class="card shadow-lg p-4 text-center">

        <h1 class="text-danger mb-3">🔥 Burn Severity Detection</h1>

        <p class="text-muted">
            Upload or capture a skin image to estimate burn severity and receive first aid guidance.
        </p>

        <!-- ================= UPLOAD FORM ================= -->
        <form id="uploadForm"
              method="POST"
              action="{% url 'predict' %}"
              enctype="multipart/form-data">

            {% csrf_token %}

            <div class="mb-3">
                <input class="form-control"
                       type="file"
                       name="image"
                       accept="image/*">
            </div>

            <button type="submit"
                    class="btn btn-danger btn-lg w-100 mb-3">
                🧠 Analyze Uploaded Image
            </button>
        </form>

        <hr>

        <!-- ================= CAMERA SECTION ================= -->

        <h5 class="mb-3">📷 Capture Live Image</h5>

        <video id="video"
               width="100%"
               height="auto"
               autoplay
               style="border-radius:10px;"></video>

        <canvas id="canvas" style="display:none;"></canvas>

        <div class="mt-3">

            <button class="btn btn-primary"
                    onclick="startCamera()">
                🎥 Start Camera
            </button>

            <button class="btn btn-success"
                    onclick="capturePhoto()">
                📸 Capture Photo
            </button>

        </div>

        <!-- Submit captured image -->
        <form id="cameraForm"
              method="POST"
              action="{% url 'predict' %}"
              enctype="multipart/form-data">

            {% csrf_token %}

            <input type="hidden" name="captured_image" id="capturedImage">

            <button type="submit"
                    class="btn btn-warning btn-lg w-100 mt-3">
                🚀 Analyze Captured Image
            </button>

        </form>

    </div>

</div>

<!-- ================= SCRIPTS ================= -->

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let capturedInput = document.getElementById("capturedImage");

// Start camera
function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => alert("Camera access denied"));
}

// Capture photo
function capturePhoto() {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    let dataURL = canvas.toDataURL("image/png");

    capturedInput.value = dataURL;

    alert("Photo captured! Now click Analyze.");
}

// Dark mode
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

{% endblock %}
