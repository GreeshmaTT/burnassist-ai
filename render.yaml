# Render Blueprint — https://render.com/docs/blueprint-spec
# TensorFlow is memory-heavy; pick an instance with enough RAM.
# Repo root is this folder; Django lives in burn_project/.

services:
  - type: web
    name: burnassist-ai
    runtime: docker
    region: oregon
    dockerfilePath: Dockerfile
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
